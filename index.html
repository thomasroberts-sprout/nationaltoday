<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Today's Holidays — Tuesday, July 14, 2026</title>
  <style>
    :root {
      --red: #e31c23;
      --teal: #00a8c5;
      --ink: #222;
      --muted: #666;
      --page: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
    }
    header {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 1.25rem 0.75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .header-text h1 {
      margin: 0 0 0.25rem;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .header-text p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .count-picker {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .count-picker label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .count-picker select {
      font: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 0.4rem 0.65rem;
      background: #fff;
      cursor: pointer;
      min-width: 4.5rem;
    }
    .count-picker select:focus {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }
    .featured-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.5rem 1.25rem 1.5rem;
    }
    .featured {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      min-height: 280px;
      background: #333;
    }
    .featured-slide {
      display: none;
      position: relative;
      min-height: 280px;
      padding: 1.25rem 1.5rem 3.5rem;
      background-size: cover;
      background-position: center;
      text-decoration: none;
      color: #fff;
    }
    .featured-slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.42);
    }
    .featured-slide.is-active { display: block; }
    .featured-label {
      position: relative;
      z-index: 1;
      display: inline-block;
      background: #fff;
      color: var(--red);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.55rem;
      border-radius: 4px;
    }
    .featured-date {
      position: absolute;
      z-index: 1;
      top: 0;
      right: 1.25rem;
      background: var(--red);
      color: #fff;
      padding: 0.45rem 0.55rem 0.5rem;
      line-height: 1.05;
      text-align: center;
      min-width: 3.4rem;
    }
    .featured-date .dow,
    .date-badge .dow {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .featured-date .md,
    .date-badge .md {
      display: block;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-top: 0.1rem;
    }
    .featured-title {
      position: absolute;
      z-index: 1;
      left: 1.5rem;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    .featured-nav {
      position: absolute;
      z-index: 2;
      bottom: 1rem;
      width: 2rem;
      height: 2rem;
      border: none;
      border-radius: 50%;
      background: #fff;
      color: var(--teal);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      display: none;
      place-items: center;
      padding: 0 0 0.1rem;
    }
    .featured-nav.is-visible { display: grid; }
    .featured-nav.prev { left: 1.25rem; }
    .featured-nav.next { right: 1.25rem; }
    .featured-nav:hover { background: #f3f3f3; }
    .grid {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.25rem 1.25rem 0.5rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem 1.25rem;
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .featured { min-height: 220px; }
      .featured-slide { min-height: 220px; }
      header { flex-direction: column; }
      .count-picker { align-items: flex-start; }
    }
    .card {
      display: block;
      min-width: 0;
    }
    .card-media {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: #ddd;
      text-decoration: none;
      color: #fff;
    }
    .card-media img,
    .placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }
    .card-media:hover img {
      transform: scale(1.04);
    }
    .date-badge {
      position: absolute;
      z-index: 2;
      top: 0;
      left: 0;
      background: var(--red);
      color: #fff;
      padding: 0.45rem 0.55rem 0.5rem;
      line-height: 1.05;
      text-align: center;
      min-width: 3.4rem;
    }
    .card-title {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 2.5rem 0.85rem 0.9rem;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.25;
      color: #fff;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .card-media:hover .card-title,
    .card-media:focus-visible .card-title {
      opacity: 1;
      transform: translateY(0);
    }
    .see-more-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.5rem 1.25rem 2rem;
      display: flex;
      justify-content: flex-end;
    }
    .see-more {
      display: inline-block;
      border: 2px solid var(--teal);
      color: var(--teal);
      background: transparent;
      padding: 0.55rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      text-transform: uppercase;
    }
    .see-more:hover {
      background: var(--teal);
      color: #fff;
    }
    footer {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 1.25rem 2.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
    footer a { color: var(--teal); }
    .empty { grid-column: 1 / -1; color: var(--muted); }
    .featured-wrap.is-hidden,
    .grid.is-hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-text">
      <h1>Today's Holidays</h1>
      <p>Tuesday, July 14, 2026 · updated 2026-07-14 16:34 UTC</p>
    </div>
    <div class="count-picker">
      <label for="count">Show</label>
      <select id="count" aria-label="How many holidays to show">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
      </select>
    </div>
  </header>
  <section class="featured-wrap" id="featured-wrap" aria-label="Featured today">
    <div class="featured" id="featured">
      <button class="featured-nav prev" type="button" aria-label="Previous">&#8249;</button>
      <button class="featured-nav next" type="button" aria-label="Next">&#8250;</button>
    </div>
  </section>
  <main class="grid" id="grid"></main>
  <div class="see-more-wrap">
    <a class="see-more" href="https://nationaltoday.com/today/" target="_blank" rel="noopener noreferrer">See More &gt;</a>
  </div>
  <footer>
    Data sourced from
    <a href="https://nationaltoday.com/today/" target="_blank" rel="noopener noreferrer">National Today</a>
    (names, images, and links only — not article text).
  </footer>
  <script>
    (function () {
      var ALL = [{"name": "National Mac and Cheese Day", "url": "https://nationaltoday.com/national-mac-and-cheese-day/", "image": "https://nationaltoday.com/wp-content/uploads/2019/07/national-mac-cheese-day.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Pandemonium Day", "url": "https://nationaltoday.com/pandemonium-day/", "image": "https://nationaltoday.com/wp-content/uploads/2020/07/Pandemonium.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Bastille Day", "url": "https://nationaltoday.com/bastille-day/", "image": "https://nationaltoday.com/wp-content/uploads/2021/07/Bastille.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Bastille day (Saint Martin)", "url": "https://nationaltoday.com/bastille-day-saint-martin/", "image": "https://nationaltoday.com/wp-content/uploads/2022/08/19-Bastille-Day-in-Saint-Martin.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Emmeline Pankhurst Day", "url": "https://nationaltoday.com/emmeline-pankhurst-day/", "image": "https://nationaltoday.com/wp-content/uploads/2022/05/15-Emmeline.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Fete de la Federation", "url": "https://nationaltoday.com/fete-de-la-federation/", "image": "https://nationaltoday.com/wp-content/uploads/2022/06/46-Fete-de-la.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "International Non-Binary Peoples Day", "url": "https://nationaltoday.com/international-non-binary-peoples-day/", "image": "https://nationaltoday.com/wp-content/uploads/2022/09/4568339-min.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National Be Nice to Bugs Day", "url": "https://nationaltoday.com/national-be-nice-to-bugs-day/", "image": "https://nationaltoday.com/wp-content/uploads/2022/09/4568205-min.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National Break Free From the Big Three Day", "url": "https://nationaltoday.com/national-break-free-big-three-day/", "image": "https://nationaltoday.com/wp-content/uploads/2021/07/National-Break-Free-From-the-Big-Three-Day.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National Grand Marnier Day", "url": "https://nationaltoday.com/national-grand-marnier-day/", "image": "https://nationaltoday.com/wp-content/uploads/2021/07/shutterstock_1344288722-min.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National No Splinters Day", "url": "https://nationaltoday.com/national-no-splinters-day/", "image": "https://nationaltoday.com/wp-content/uploads/2025/07/splinter.jpeg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National Nude Day", "url": "https://nationaltoday.com/national-nude-day/", "image": "https://nationaltoday.com/wp-content/uploads/2019/06/national-nude-day.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "National Tape Measure Day", "url": "https://nationaltoday.com/national-tape-measure-day/", "image": "https://nationaltoday.com/wp-content/uploads/2021/07/Tape-Measure-1.jpg", "weekday": "TUE", "month_day": "JUL 14"}, {"name": "Shark Awareness Day", "url": "https://nationaltoday.com/shark-awareness-day/", "image": "https://nationaltoday.com/wp-content/uploads/2021/07/shutterstock_1488699209-min.jpg", "weekday": "TUE", "month_day": "JUL 14"}];
      var DEFAULT = 5;
      var KEY = "holidayCount";
      var featuredRoot = document.getElementById("featured");
      var featuredWrap = document.getElementById("featured-wrap");
      var grid = document.getElementById("grid");
      var select = document.getElementById("count");
      var prevBtn = featuredRoot.querySelector(".prev");
      var nextBtn = featuredRoot.querySelector(".next");
      var featuredIndex = 0;
      var visible = [];

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function getCount() {
        var n = parseInt(select.value, 10);
        if (!n || n < 1) n = Math.min(DEFAULT, ALL.length);
        return Math.min(n, ALL.length);
      }

      function renderFeatured(item) {
        var existing = featuredRoot.querySelector(".featured-slide");
        if (existing) existing.remove();
        if (!item) {
          featuredWrap.classList.add("is-hidden");
          return;
        }
        featuredWrap.classList.remove("is-hidden");
        var a = document.createElement("a");
        a.className = "featured-slide is-active";
        a.href = item.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.backgroundImage = item.image ? "url('" + esc(item.image) + "')" : "";
        a.innerHTML =
          '<span class="featured-label">Featured</span>' +
          '<span class="featured-date"><span class="dow">' + esc(item.weekday) +
          '</span><span class="md">' + esc(item.month_day) + '</span></span>' +
          '<span class="featured-title">' + esc((item.name || "").toUpperCase()) + '</span>';
        featuredRoot.insertBefore(a, prevBtn);
        var showNav = visible.length > 1;
        prevBtn.classList.toggle("is-visible", showNav);
        nextBtn.classList.toggle("is-visible", showNav);
      }

      function renderCards(items) {
        if (!items.length) {
          grid.innerHTML = "";
          grid.classList.add("is-hidden");
          return;
        }
        grid.classList.remove("is-hidden");
        grid.innerHTML = items.map(function (h) {
          return (
            '<article class="card">' +
              '<a class="card-media" href="' + esc(h.url) + '" target="_blank" rel="noopener noreferrer">' +
                (h.image
                  ? '<img src="' + esc(h.image) + '" alt="' + esc(h.name) + '" loading="lazy" width="400" height="400">'
                  : '<div class="placeholder"></div>') +
                '<div class="date-badge"><span class="dow">' + esc(h.weekday) +
                '</span><span class="md">' + esc(h.month_day) + '</span></div>' +
                '<span class="card-title">' + esc(h.name) + '</span>' +
              '</a>' +
            '</article>'
          );
        }).join("");
      }

      function apply() {
        var count = getCount();
        visible = ALL.slice(0, count);
        if (featuredIndex >= visible.length) featuredIndex = 0;
        var featured = visible[featuredIndex];
        var cards = visible.filter(function (_, i) { return i !== featuredIndex; });
        renderFeatured(featured);
        renderCards(cards);
        try { localStorage.setItem(KEY, String(count)); } catch (e) {}
      }

      var saved = null;
      try { saved = parseInt(localStorage.getItem(KEY), 10); } catch (e) {}
      if (saved && saved >= 1 && saved <= ALL.length) {
        select.value = String(saved);
      } else {
        select.value = String(Math.min(DEFAULT, ALL.length));
      }

      select.addEventListener("change", function () {
        featuredIndex = 0;
        apply();
      });
      prevBtn.addEventListener("click", function (e) {
        e.preventDefault();
        if (visible.length < 2) return;
        featuredIndex = (featuredIndex - 1 + visible.length) % visible.length;
        apply();
      });
      nextBtn.addEventListener("click", function (e) {
        e.preventDefault();
        if (visible.length < 2) return;
        featuredIndex = (featuredIndex + 1) % visible.length;
        apply();
      });

      apply();
    })();
  </script>
</body>
</html>
